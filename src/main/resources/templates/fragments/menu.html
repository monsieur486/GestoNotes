<html lang="fr"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="menu">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">

            <!-- Logo -->
            <a class="navbar-brand" href="/" style="margin-left: 13px;">📝 GestoNotes</a>

            <!-- Burger -->
            <button aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation"
                    class="navbar-toggler" data-bs-target="#mainNavbar"
                    data-bs-toggle="collapse" type="button">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Contenu -->
            <div class="collapse navbar-collapse" id="mainNavbar">

                <!-- Gauche : 3 pages -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/"
                           th:classappend="${page_active == 'home'} ? ' active' : ''"
                        >🏠︎ Accueil</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" href="/notes"
                           th:classappend="${page_active == 'notes'} ? ' active' : ''"
                        >🗃️ Notes</a>
                    </li>
                </ul>

                <!-- Droite : 2 pages -->
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" href="/categories"
                           th:classappend="${page_active == 'categories'} ? ' active' : ''"
                        >🗂️ Catégories</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()" th:if="${modeEdit != null}">
                        <a class="nav-link btn btn-warning ms-2 me-2"
                           th:href="${modeEdit} ? '/notes' : '/notes?modeEdit=true'"
                           th:text="${modeEdit} ? '✅ Mode Normal' : '✏️ Mode Edition'">
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link" href="/login"
                           th:classappend="${page_active == 'login'} ? ' active' : ''"
                        >🔒 Connexion</a>
                    </li>
                    <form method="post" sec:authorize="isAuthenticated()" th:action="@{/logout}">
                        <button class="btn btn-primary" type="submit">🔓 Déconnexion</button>
                    </form>
                </ul>
            </div>
        </div>
    </nav>
    <div id="top-offset"></div>
</div>
</html>
