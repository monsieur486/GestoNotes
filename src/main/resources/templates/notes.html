<!DOCTYPE HTML>
<html lang="fr"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>GestoNotes</title>
    <div th:replace="~{fragments/header :: header-css}"></div>
</head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>
<div class="container-fluid">
    <!-- Onglets nav -->
    <ul class="nav nav-tabs" id="categoriesTabs" role="tablist">
        <li class="nav-item" role="presentation" th:each="categorie, iter : ${categories}">
            <button class="nav-link"
                    data-bs-toggle="tab"
                    role="tab"
                    th:classappend="${(catActif != null and categorie.id == catActif) or (catActif == null and iter.first)} ? 'active'"
                    th:data-bs-target="${'#pane-' + iter.index}"
                    th:id="${'tab-' + iter.index}"
                    th:text="${categorie.denomination}"
                    type="button">
            </button>
        </li>
    </ul>

    <!-- Contenu des onglets -->
    <div class="tab-content mt-3" id="categoriesTabsContent">
        <div class="tab-pane fade"
             role="tabpanel"
             th:aria-labelledby="${'tab-' + iter.index}"
             th:classappend="${(catActif != null and categorie.id == catActif) or (catActif == null and iter.first)} ? 'show active'"
             th:each="categorie, iter : ${categories}"
             th:id="${'pane-' + iter.index}"
             th:if="${categorie != null}">

            <div class="mb-2">
                <a th:if="${modeEdit}"
                   th:href="@{/notes/add/{id}(id=${categorie.id})}"
                   class="btn btn-success btn-sm">
                    ➕ Ajouter une note
                </a>
            </div>

            <div class="board">
                <div th:each="note : ${categorie.notes}" class="postit-wrap">
                    <a th:if="${modeEdit}"
                       th:href="@{/notes/update/{id}(id=${note.id})}"
                       class="postit" th:classappend="${note.couleur}">
                        <span class="postit-title" th:text="${note.titre}"></span>
                        <span class="postit-preview" th:text="${note.contenu}"></span>
                    </a>
                    <button th:unless="${modeEdit}"
                            onclick="navigator.clipboard.writeText(this.dataset.contenu)"
                            class="postit" th:classappend="${note.couleur}"
                            th:data-contenu="${note.contenu}"
                            type="button">
                        <span class="postit-title" th:text="${note.titre}"></span>
                        <span class="postit-preview" th:text="${note.contenu}"></span>
                    </button>
                    <form th:if="${modeEdit}"
                          th:action="@{/notes/delete/{id}(id=${note.id})}"
                          method="post"
                          class="postit-delete">
                        <input type="hidden" name="_method" value="delete"/>
                        <input type="hidden" name="categorieId" th:value="${note.categorieId}"/>
                        <button type="submit" class="btn btn-danger btn-sm">🗑️</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
